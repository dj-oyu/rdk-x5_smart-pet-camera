<!DOCTYPE html>
<html>
<head>
    <title>Smart Pet Camera Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/monitor.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">Smart Pet Camera Monitor</div>
            <span class="badge badge-secondary" id="status-badge">Waiting for data...</span>
            <div class="viewer-count" id="viewer-count-container">
                <span class="viewer-icon">👁</span>
                <span id="viewer-count">-</span>
            </div>
        </div>

        <div class="main-content">
            <!-- Video Area -->
            <div class="video-container">
                <div id="video-panel">
                    <!-- WebRTC View (default) -->
                    <div id="webrtc-view" style="position:relative;width:100%;display:block;">
                        <video id="webrtc-video" autoplay playsinline muted
                               style="width:100%;height:auto;display:block;background:#000;border-radius:8px 8px 0 0;"></video>
                        <canvas id="bbox-canvas"
                                style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>
                    </div>
                    <!-- MJPEG View (fallback) -->
                    <div id="mjpeg-view" style="display:none;">
                        <img id="stream" alt="Camera stream" style="width:100%;height:auto;border-radius:8px 8px 0 0;">
                    </div>
                </div>
                <!-- Video Controls -->
                <div class="video-controls" id="video-controls">
                    <div class="view-toggle" id="stream-toggle">
                        <button type="button" id="btn-webrtc" class="active">WebRTC</button>
                        <button type="button" id="btn-mjpeg">MJPEG</button>
                    </div>
                    <div class="record-controls">
                        <button class="btn-recordings" id="fab-recordings" title="録画一覧">
                            <span class="recordings-icon"></span>
                        </button>
                        <button id="record-btn" class="record-btn" title="REC">
                            <span class="record-icon"></span>
                        </button>
                        <span id="record-status" class="record-status"></span>
                    </div>
                </div>
            </div>

            <!-- Recordings Modal -->
            <div class="modal-overlay" id="recordings-modal" style="display:none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>録画一覧</h3>
                        <button class="modal-close" id="modal-close">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="recordings-list" id="recordings-list">
                            <p class="muted">録画がありません</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thumbnail Preview Modal -->
            <div class="modal-overlay thumbnail-preview-modal" id="thumbnail-preview-modal" style="display:none;">
                <div class="thumbnail-preview-content">
                    <button class="thumbnail-preview-close" id="thumbnail-preview-close">&times;</button>
                    <img class="thumbnail-preview-img" id="thumbnail-preview-img" src="" alt="サムネイル">
                    <div class="thumbnail-preview-info" id="thumbnail-preview-info"></div>
                </div>
            </div>

            <!-- Hidden elements for JS compatibility -->
            <div style="display:none;">
                <span id="stream-subtitle"></span>
                <span id="stream-footer"></span>
                <span id="fps"></span>
                <span id="target-fps"></span>
                <span id="detections"></span>
                <span id="detection-version"></span>
                <span id="shm-buffer"></span>
                <span id="last-updated"></span>
                <span id="frames-total"></span>
                <span id="event-rate"></span>
                <span id="bandwidth"></span>
                <span id="bandwidth-reduction"></span>
                <span id="record-info"></span>
            </div>

            <!-- Sidebar: Trajectory + Comic Gallery -->
            <div class="sidebar">
                <div class="trajectory-card" id="trajectory-card">
                    <canvas class="trajectory-canvas" id="trajectory-canvas"></canvas>
                    <div class="legend" id="trajectory-legend"></div>
                </div>

                <div class="panel">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <h2>ねこコミック</h2>
                            <p class="panel-subtitle">検出時の4コマスナップショット</p>
                        </div>
                    </div>
                    <div class="comic-gallery" id="comic-gallery">
                        <p class="muted">コミックはまだありません。猫の検出を待機しています。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/assets/monitor.js"></script>
    <script type="module" src="/assets/app.js"></script>
</body>
</html>
