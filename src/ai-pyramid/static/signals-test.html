<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signals Test Bench</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: #0a0a0f; color: #e0e0e0;
    line-height: 1.5;
  }
  .test-app { max-width: 1200px; margin: 0 auto; }
  h1 { color: #fff; margin: 0 0 4px; }
  h2 { color: #ccc; margin: 32px 0 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .subtitle { color: #888; margin: 0 0 24px; font-size: 14px; }
  .test-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .test-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(8px);
  }
  .test-card h3 { margin: 0 0 8px; color: #fff; font-size: 15px; }
  .test-card p { margin: 4px 0; font-size: 14px; }
  .test-card strong { color: #6EFF9E; }
  .test-card code {
    background: rgba(255,255,255,0.08);
    padding: 2px 6px; border-radius: 4px;
    font-size: 12px; color: #FFC878;
  }
  .test-card pre {
    background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px;
    font-size: 12px; overflow-x: auto; color: #A0DCFF;
  }
  .hint { color: #666; font-size: 12px; font-style: italic; }
  .dim { color: #555; font-size: 12px; }
  button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; margin: 4px 4px 4px 0;
    transition: background 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.2); }
  .item-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .mock-modal {
    margin-top: 12px;
    background: rgba(110, 255, 158, 0.08);
    border: 2px solid #6EFF9E;
    border-radius: 8px;
    padding: 12px;
    animation: fadeIn 0.15s ease-out;
  }
  .mock-modal-content strong { color: #6EFF9E; display: block; margin-bottom: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
</style>
</head>
<body>
<div id="app"></div>
<script src="/test/signals-test.js"></script>
</body>
</html>
