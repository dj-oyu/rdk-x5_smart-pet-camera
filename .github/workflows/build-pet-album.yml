name: Build pet-album (aarch64)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-pet-album.yml'
      - 'src/ai-pyramid/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-pet-album.yml'
      - 'src/ai-pyramid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    defaults:
      run:
        working-directory: src/ai-pyramid

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/ai-pyramid/target
          key: aarch64-22.04-cargo-${{ hashFiles('src/ai-pyramid/Cargo.lock') }}-ui-${{ hashFiles('src/ai-pyramid/ui/src/**', 'src/web/src/styles/album.css') }}
          restore-keys: aarch64-22.04-cargo-${{ hashFiles('src/ai-pyramid/Cargo.lock') }}-ui-
            aarch64-22.04-cargo-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            src/ai-pyramid/ui/node_modules
          key: aarch64-22.04-bun-${{ hashFiles('src/ai-pyramid/ui/bun.lock', 'src/ai-pyramid/ui/package.json') }}
          restore-keys: aarch64-22.04-bun-

      - name: Install frontend dependencies
        working-directory: src/ai-pyramid/ui
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: src/ai-pyramid/ui
        run: bun run build

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Binary info
        run: |
          ls -lh target/release/pet-album
          file target/release/pet-album

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pet-album-aarch64
          path: src/ai-pyramid/target/release/pet-album
