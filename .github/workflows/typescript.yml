name: "TypeScript"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/web/**'
      - '.github/workflows/typescript.yml'
  workflow_dispatch:

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: bunx tsc --noEmit
