name: "Lint: Docs"

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '**/CLAUDE.md'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  mermaid:
    name: "Docs: mermaid"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install mermaid-cli
        run: |
          npm install -g @mermaid-js/mermaid-cli
          echo '{"args":["--no-sandbox"]}' > /tmp/puppeteer-config.json
      - name: Validate mermaid blocks
        run: |
          FAIL=0
          for file in $(find docs src -name '*.md' \( -path '*/docs/*' -o -name 'CLAUDE.md' \) | sort); do
            # Extract mermaid blocks
            rm -f /tmp/mermaid_block_*.mmd
            awk '/^```mermaid$/{flag=1; block++; next} /^```$/{if(flag) flag=0; next} flag{print > "/tmp/mermaid_block_" block ".mmd"}' "$file"
            BLOCK=0
            for mmd in /tmp/mermaid_block_*.mmd; do
              [ -f "$mmd" ] || continue
              BLOCK=$((BLOCK+1))
              echo "--- Checking $file block #$BLOCK ---"
              if mmdc -i "$mmd" -o /tmp/mermaid_out.svg -p /tmp/puppeteer-config.json 2>&1; then
                echo "OK: $file block #$BLOCK"
              else
                echo "::error file=$file::FAIL: block #$BLOCK"
                cat "$mmd"
                FAIL=1
              fi
              rm -f "$mmd" /tmp/mermaid_out.svg
            done
          done
          [ "$FAIL" -eq 1 ] && exit 1
          echo "All mermaid blocks valid"
