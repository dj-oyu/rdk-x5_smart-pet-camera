name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go:
    name: "Go: test"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(join(github.event.pull_request.*.filename, ' '), 'src/streaming_server/')
    defaults:
      run:
        working-directory: src/streaming_server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: src/streaming_server/go.mod
          cache-dependency-path: src/streaming_server/go.sum
      - run: go test ./... -v -count=1

  rust:
    name: "Rust: test"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(join(github.event.pull_request.*.filename, ' '), 'src/ai-pyramid/')
    defaults:
      run:
        working-directory: src/ai-pyramid
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/ai-pyramid/target
          key: test-cargo-${{ hashFiles('src/ai-pyramid/Cargo.lock') }}
          restore-keys: test-cargo-
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Build frontend
        working-directory: src/ai-pyramid/ui
        run: bun install --frozen-lockfile && bun run build
      - run: cargo test

