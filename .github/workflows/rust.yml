name: "Rust"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/ai-pyramid/**'
      - 'src/web/src/styles/album.css'
      - '.github/workflows/rust.yml'
  workflow_dispatch:

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path src/ai-pyramid/Cargo.toml -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-pyramid
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/ai-pyramid/target
          key: clippy-cargo-${{ hashFiles('src/ai-pyramid/Cargo.lock') }}
          restore-keys: clippy-cargo-
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Build frontend
        working-directory: src/ai-pyramid/ui
        run: bun install --frozen-lockfile && bun run build
      - run: cargo clippy -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-pyramid
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/ai-pyramid/target
          key: test-cargo-${{ hashFiles('src/ai-pyramid/Cargo.lock') }}
          restore-keys: test-cargo-
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Build frontend
        working-directory: src/ai-pyramid/ui
        run: bun install --frozen-lockfile && bun run build
      - run: cargo test
